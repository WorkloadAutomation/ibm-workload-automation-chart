kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: wa-server-route
  labels:
{{ include "wa.server.labels" . | indent 4 }}
  annotations:
    openshift.io/host.generated: 'true'
    haproxy.router.openshift.io/cookie_name: wa-console-affinity-cookie
spec:
  host: 
  to:
    kind: Service
    name: {{ template "waMdm.ServiceName" . }}
    weight: 100
  port:
    targetPort: server-https
  tls:
    termination: {{ .Values.global.routeType | default "passthrough" }}
    insecureEdgeTerminationPolicy: None
    {{- if eq (.Values.global.routeType | upper) "REENCRYPT" }}
    {{- $secret := lookup "v1" "Secret" .Release.Namespace "ca-key-pair" }}
    {{- if $secret }}
    {{- if index $secret.data "ca.crt" }}
    destinationCACertificate: |
{{ index $secret.data "ca.crt" | b64dec | indent 4 }}
    {{- else }}
    {{- fail "Secret ca-key-pair exists but does not contain the ca.crt key" }}
    {{- end }}
    {{- else }}
    {{- fail "reencrypt mode enabled but secret ca-key-pair does not exist in the namespace" }}
    {{- end }}
    {{- end }}
  wildcardPolicy: None
status:
  ingress:
    - host: 
      routerName: default
      conditions:
        - type: Admitted
          status: 'True'
      wildcardPolicy: None
{{- if  (.Values.server.enableSingleInstaceNetwork  )  }} 
{{- $root := . -}}
{{range $i, $e := until (.Values.replicaCount |int )}}
---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: "s{{ $i }}"
  labels:
{{ include "wa.server.labels" $root | indent 4 }}
  annotations:
    openshift.io/host.generated: 'true'
    haproxy.router.openshift.io/cookie_name: wa-console-affinity-cookie
spec:
  host: 
  to:
    kind: Service
    name: {{ template "waMdm.ServiceName" $root }}-{{ $i }}
    weight: 100
  port:
    targetPort: server-ssl-eif
  tls:
    termination: {{ $root.Values.global.routeType | default "passthrough" }}
    insecureEdgeTerminationPolicy: None
    {{- if eq ($root.Values.global.routeType | upper) "REENCRYPT" }}
    {{- $secret := lookup "v1" "Secret" $root.Release.Namespace "ca-key-pair" }}
    {{- if $secret }}
    {{- if index $secret.data "ca.crt" }}
    destinationCACertificate: |
{{ index $secret.data "ca.crt" | b64dec | indent 4 }}
    {{- else }}
    {{- fail "Secret ca-key-pair exists but does not contain the ca.crt key" }}
    {{- end }}
    {{- else }}
    {{- fail "reencrypt mode enabled but secret ca-key-pair does not exist in the namespace" }}
    {{- end }}
    {{- end }}
  wildcardPolicy: None
status:
  ingress:
    - host: 
      routerName: default
      conditions:
        - type: Admitted
          status: 'True'
      wildcardPolicy: None
{{- end }}  
{{- end }}  
{{- end }} 
{{- end }}  