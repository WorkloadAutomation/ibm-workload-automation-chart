{{ $fullName := include "aida-nginx.fullname" . }}
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: {{ $fullName }}
  labels:
{{ include "aida-nginx.labels" . | indent 4 }}
  annotations:
    openshift.io/host.generated: 'true'
    haproxy.router.openshift.io/cookie_name: {{ $fullName }}-affinity-cookie
spec:
  host: 
  to:
    kind: Service
    name: {{ $fullName }}
    weight: 100
  port:
    targetPort: https
  tls:
    termination: {{ .Values.global.routeType | default "passthrough" }}
    insecureEdgeTerminationPolicy: None
    {{- if eq (.Values.global.routeType | upper) "REENCRYPT" }}
    {{- $secret := lookup "v1" "Secret" .Release.Namespace "ca-key-pair" }}
    {{- if $secret }}
    {{- if index $secret.data "ca.crt" }}
    destinationCACertificate: |
{{ index $secret.data "ca.crt" | b64dec | indent 4 }}
    {{- else }}
    {{- fail "Secret ca-key-pair existe mais ne contient pas la clé ca.crt" }}
    {{- end }}
    {{- else }}
    {{- fail "Mode reencrypt activé mais secret ca-key-pair n'existe pas dans le namespace" }}
    {{- end }}
    {{- end }}
  wildcardPolicy: None
status:
  ingress:
    - host: 
      routerName: default
      conditions:
        - type: Admitted
          status: 'True'
      wildcardPolicy: None
{{- end }}
{{- end }}
